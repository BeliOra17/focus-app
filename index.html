<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Фокус</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080a;
  --s1: #0e1018;
  --s2: #141720;
  --s3: #1b1f2c;
  --border: #222738;
  --accent: #5ce0d2;
  --accent2: #3bbfb3;
  --accent-dim: rgba(92,224,210,0.06);
  --gold: #f0c040;
  --gold-dim: rgba(240,192,64,0.06);
  --red: #e85454;
  --red-dim: rgba(232,84,84,0.06);
  --green: #3dd68c;
  --green-dim: rgba(61,214,140,0.06);
  --purple: #9b7af5;
  --t1: #dfe3f0;
  --t2: #7c859e;
  --t3: #424a60;
  --r: 12px;
  --rs: 8px;
}

* { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
body { background:var(--bg);color:var(--t1);font-family:'Outfit',sans-serif;min-height:100vh;font-size:14px;overscroll-behavior:none; }
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
input,button,textarea{font-family:inherit;}

/* ===== NAV ===== */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(14,16,24,0.92);}
.nav-item{flex:1;padding:10px 0 8px;text-align:center;cursor:pointer;transition:all 0.15s;position:relative;}
.nav-item .ni{font-size:18px;transition:transform 0.15s;}
.nav-item .nl{font-size:8px;color:var(--t3);margin-top:3px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;transition:color 0.15s;}
.nav-item.active .nl{color:var(--accent);}
.nav-item.active .ni{transform:scale(1.15);}
.nav-item::after{content:'';position:absolute;top:0;left:30%;right:30%;height:2px;background:var(--accent);border-radius:0 0 2px 2px;transform:scaleX(0);transition:transform 0.2s;}
.nav-item.active::after{transform:scaleX(1);}

.screen{display:none;padding:20px 16px 85px;max-width:560px;margin:0 auto;}
.screen.active{display:block;animation:fadeIn 0.15s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ===== RUNWAY ===== */
.rw{background:linear-gradient(135deg,var(--s1) 0%,var(--s2) 100%);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px;position:relative;overflow:hidden;}
.rw::before{content:'';position:absolute;top:0;right:0;width:120px;height:120px;background:radial-gradient(circle,rgba(92,224,210,0.04) 0%,transparent 70%);pointer-events:none;}
.rw-head{display:flex;justify-content:space-between;align-items:flex-start;}
.rw-label{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px;}
.rw-val{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;line-height:1;letter-spacing:-1px;}
.rw-unit{font-size:14px;font-weight:400;color:var(--t2);margin-left:2px;}
.rw-bal{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;text-align:right;}
.rw-sub{font-size:10px;color:var(--t3);margin-top:3px;}
.rw-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin:16px 0 10px;}
.rw-bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}
.rw-stats{display:flex;gap:16px;font-size:11px;color:var(--t3);}
.rw-stats span{display:flex;align-items:center;gap:3px;}

/* ===== SECTION ===== */
.sec{margin-bottom:20px;}
.sec-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sec-t{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px;}
.sec-btn{background:none;border:1px solid var(--border);color:var(--t2);font-size:11px;padding:5px 14px;border-radius:20px;cursor:pointer;transition:all 0.15s;}
.sec-btn:hover,.sec-btn:active{border-color:var(--accent);color:var(--accent);}

/* ===== FOCUS CARD ===== */
.fc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:all 0.12s;position:relative;}
.fc:active{transform:scale(0.985);background:var(--s2);}
.fc.done{opacity:0.35;}
.fc.done .fc-text{text-decoration:line-through;}
.fc-ck{width:22px;height:22px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px;transition:all 0.15s;}
.fc.done .fc-ck{border-color:var(--green);color:var(--green);background:var(--green-dim);}
.fc-body{flex:1;min-width:0;}
.fc-text{font-size:14px;font-weight:500;line-height:1.45;}
.fc-meta{font-size:10px;color:var(--t3);margin-top:3px;display:flex;gap:8px;align-items:center;}
.fc-em{font-size:18px;flex-shrink:0;}
.fc-del{position:absolute;top:8px;right:10px;color:var(--t3);font-size:16px;cursor:pointer;opacity:0;transition:opacity 0.15s;padding:4px;}
.fc:hover .fc-del{opacity:0.6;}

/* ===== QUICK TASK ===== */
.qt{background:var(--s2);border-radius:var(--rs);padding:11px 14px;margin-bottom:3px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.1s;}
.qt:active{background:var(--s3);}
.qt.done{opacity:0.3;}
.qt.done .qt-text{text-decoration:line-through;}
.qt-ck{width:16px;height:16px;border:1.5px solid var(--t3);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all 0.15s;}
.qt.done .qt-ck{border-color:var(--green);color:var(--green);background:var(--green-dim);}
.qt-text{font-size:13px;flex:1;min-width:0;line-height:1.4;}
.qt-del{color:var(--t3);font-size:14px;cursor:pointer;padding:2px 4px;opacity:0;transition:opacity 0.15s;}
.qt:hover .qt-del{opacity:0.6;}

/* ===== WIN LOG ===== */
.win{background:var(--gold-dim);border:1px solid rgba(240,192,64,0.15);border-radius:var(--rs);padding:10px 14px;margin-bottom:4px;display:flex;align-items:center;gap:10px;font-size:12px;}
.win-em{font-size:16px;}
.win-text{flex:1;color:var(--gold);}
.win-amt{font-family:'Space Mono',monospace;font-weight:700;color:var(--gold);}

/* ===== MODULE PANEL ===== */
.mp{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all 0.12s;}
.mp:active{background:var(--s2);}
.mp-l{display:flex;align-items:center;gap:10px;}
.mp-em{font-size:24px;}
.mp-name{font-size:13px;font-weight:600;}
.mp-sub{font-size:10px;color:var(--t3);margin-top:1px;}
.mp-r{text-align:right;}
.mp-stat{font-family:'Space Mono',monospace;font-size:14px;font-weight:600;}
.mp-sl{font-size:9px;color:var(--t3);}

/* ===== MODAL ===== */
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.mo.show{display:flex;animation:fadeIn 0.15s ease;}
.mo-box{background:var(--s1);border-top:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:560px;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));}
.mo-title{font-size:15px;font-weight:700;margin-bottom:16px;}
.mo-input{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--t1);font-size:14px;padding:12px 14px;border-radius:var(--rs);outline:none;transition:border-color 0.15s;}
.mo-input:focus{border-color:var(--accent);}
.mo-input+.mo-input{margin-top:8px;}
.mo-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.mo-tag{background:var(--s2);border:1px solid var(--border);color:var(--t2);font-size:12px;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all 0.12s;}
.mo-tag.sel{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.mo-submit{background:var(--accent);color:#000;border:none;font-size:14px;font-weight:600;padding:14px;border-radius:var(--rs);cursor:pointer;margin-top:16px;width:100%;transition:opacity 0.12s;}
.mo-submit:active{opacity:0.8;}
.mo-hint{font-size:10px;color:var(--t3);margin-top:6px;}

/* ===== WEEK ===== */
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px;}
.wk-d{background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);padding:10px 4px;text-align:center;cursor:pointer;transition:all 0.12s;}
.wk-d:active{background:var(--s2);}
.wk-d.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.wk-dn{font-size:8px;color:var(--t3);text-transform:uppercase;font-weight:700;letter-spacing:0.5px;}
.wk-dd{font-size:18px;font-weight:800;margin:5px 0 4px;}
.wk-dots{font-size:7px;line-height:1;min-height:12px;}
.wk-pct{font-size:9px;color:var(--t3);font-family:'Space Mono',monospace;margin-top:2px;}
.wk-summary{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;}
.wk-s-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;}
.wk-s-label{font-size:9px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}

/* ===== MONEY ===== */
.mn-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);padding:12px 16px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.mn-desc{font-size:13px;font-weight:500;}
.mn-amt{font-family:'Space Mono',monospace;font-size:13px;font-weight:600;}
.mn-cat{font-size:9px;color:var(--t3);margin-top:2px;}
.mn-group{font-size:10px;color:var(--t3);font-weight:600;padding:10px 0 6px;text-transform:uppercase;letter-spacing:0.8px;display:flex;justify-content:space-between;}

/* ===== SETTINGS ===== */
.st-block{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;}
.st-label{font-size:11px;color:var(--t2);font-weight:500;margin-bottom:8px;}
.st-input{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--t1);font-size:13px;padding:10px 12px;border-radius:var(--rs);outline:none;}
.st-input:focus{border-color:var(--accent);}

/* ===== PROFILE ===== */
.pr-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:8px;}
.pr-row{display:flex;justify-content:space-between;align-items:baseline;}
.pr-val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;}
.pr-label{font-size:10px;color:var(--t3);margin-top:2px;}

/* ===== DAY NAV ===== */
.day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.day-nav-btn{background:var(--s2);border:1px solid var(--border);color:var(--t2);font-size:18px;width:38px;height:38px;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.day-nav-btn:active{background:var(--s3);}
.day-nav-center{text-align:center;}
.day-nav-date{font-size:17px;font-weight:700;}
.day-nav-back{font-size:10px;color:var(--accent);cursor:pointer;margin-top:3px;}

/* ===== RESPONSIVE ===== */
/* ===== PRO PAYWALL ===== */
.pro-wall{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:40px 20px;text-align:center;}
.pro-icon{font-size:56px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(92,224,210,0.3));}
.pro-title{font-size:22px;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.pro-desc{font-size:13px;color:var(--t2);max-width:280px;line-height:1.6;margin-bottom:24px;}
.pro-features{text-align:left;margin-bottom:28px;width:100%;max-width:300px;}
.pro-feat{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px;font-size:13px;}
.pro-feat-icon{font-size:18px;}
.pro-btn{background:linear-gradient(135deg,var(--accent),#3bbfb3);color:#000;border:none;font-size:15px;font-weight:700;padding:16px 40px;border-radius:var(--r);cursor:pointer;transition:all 0.15s;box-shadow:0 4px 24px rgba(92,224,210,0.25);width:100%;max-width:300px;}
.pro-btn:active{transform:scale(0.97);opacity:0.9;}
.pro-price{font-size:11px;color:var(--t3);margin-top:10px;}
.pro-restore{font-size:11px;color:var(--accent);cursor:pointer;margin-top:12px;opacity:0.7;}
.pro-restore:active{opacity:1;}
.pro-badge{display:inline-block;font-size:7px;font-weight:800;color:#000;background:linear-gradient(135deg,var(--accent),var(--gold));padding:2px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;letter-spacing:0.5px;}
.nav-item .pro-lock{font-size:6px;color:var(--gold);position:absolute;top:6px;right:50%;transform:translateX(12px);}

@media(max-width:400px){
  .rw-val{font-size:30px;}
  .rw-bal{font-size:17px;}
  .wk-dd{font-size:15px;}
  .wk-d{padding:8px 2px;}
}
</style>
</head>
<body>

<div id="profile" class="screen active"></div>
<div id="day" class="screen"></div>
<div id="week" class="screen"></div>
<div id="month" class="screen"></div>
<div id="money" class="screen"></div>

<nav class="nav">
  <div class="nav-item active" data-s="profile" onclick="go('profile')"><div class="ni">⚡</div><div class="nl">Профиль</div></div>
  <div class="nav-item" data-s="day" onclick="go('day')"><div class="ni">📋</div><div class="nl">День</div></div>
  <div class="nav-item" data-s="week" onclick="go('week')"><div class="ni">📅</div><div class="nl">Неделя</div><div class="pro-lock" id="lock-week">🔒</div></div>
  <div class="nav-item" data-s="month" onclick="go('month')"><div class="ni">📆</div><div class="nl">Месяц</div><div class="pro-lock" id="lock-month">🔒</div></div>
  <div class="nav-item" data-s="money" onclick="go('money')"><div class="ni">💰</div><div class="nl">Деньги</div></div>
</nav>

<div class="mo" id="mo" onclick="if(event.target===this)closeMo()"><div class="mo-box" id="mo-box"></div></div>

<script>
// ============================================================
// TELEGRAM
// ============================================================
const tg=window.Telegram&&window.Telegram.WebApp;
const isTG=!!(tg&&tg.initData);
if(isTG){tg.ready();tg.expand();tg.setHeaderColor('#07080a');tg.setBackgroundColor('#07080a');}

// ============================================================
// PRO SYSTEM
// ============================================================
const BOT_TOKEN='8787098183:AAEorhuiKewQpIL59n4M9fydkCpdJ7_VZM4'; // Токен от BotFather
const PRO_STARS=50; // Цена в Stars
const PRO_KEY='focus_pro';
const OWNER_ID='5224423358';

function isPro(){
  // Owner always has PRO
  if(isTG&&tg.initDataUnsafe&&tg.initDataUnsafe.user&&String(tg.initDataUnsafe.user.id)===OWNER_ID)return true;
  try{return localStorage.getItem(PRO_KEY)==='1';}catch(e){return false;}
}
function setPro(){
  try{localStorage.setItem(PRO_KEY,'1');}catch(e){}
  if(isTG&&tg.CloudStorage)tg.CloudStorage.setItem(PRO_KEY,'1',()=>{});
  updateLocks();
}
function updateLocks(){
  const pro=isPro();
  const lw=document.getElementById('lock-week');
  const lm=document.getElementById('lock-month');
  if(lw)lw.style.display=pro?'none':'block';
  if(lm)lm.style.display=pro?'none':'block';
}

function showPaywall(screenId){
  const el=document.getElementById(screenId);
  el.innerHTML=`<div class="pro-wall">
    <div class="pro-icon">⭐</div>
    <div class="pro-title">Focus PRO</div>
    <div class="pro-desc">Разблокируй полный обзор своей продуктивности</div>
    <div class="pro-features">
      <div class="pro-feat"><div class="pro-feat-icon">📅</div><div>Обзор недели — 7 дней на одном экране</div></div>
      <div class="pro-feat"><div class="pro-feat-icon">📆</div><div>Календарь месяца — прогресс по дням</div></div>
      <div class="pro-feat"><div class="pro-feat-icon">📊</div><div>Статистика — фокусы, дела, расходы</div></div>
      <div class="pro-feat"><div class="pro-feat-icon">♾️</div><div>Навсегда — одна покупка, без подписки</div></div>
    </div>
    <button class="pro-btn" onclick="buyPro()">⭐ Разблокировать PRO</button>
    <div class="pro-price">${PRO_STARS} Stars · одноразовый платёж</div>
    <div class="pro-restore" onclick="restorePro()">Уже покупал? Восстановить</div>
  </div>`;
}

async function buyPro(){
  if(!isTG){alert('Оплата доступна только в Telegram');return;}
  try{
    const resp=await fetch('https://api.telegram.org/bot'+BOT_TOKEN+'/createInvoiceLink',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        title:'Focus PRO',
        description:'Неделя + Месяц + Статистика — навсегда',
        payload:'focus_pro_'+Date.now(),
        currency:'XTR',
        prices:[{label:'Focus PRO',amount:PRO_STARS}]
      })
    });
    const data=await resp.json();
    if(!data.ok){alert('Ошибка: '+JSON.stringify(data.description));return;}
    tg.openInvoice(data.result,function(status){
      if(status==='paid'){
        setPro();
        rCurrent();
        if(tg.HapticFeedback)tg.HapticFeedback.notificationOccurred('success');
      }
    });
  }catch(e){alert('Ошибка оплаты: '+e.message);}
}

function restorePro(){
  if(!isTG||!tg.CloudStorage){alert('Восстановление доступно только в Telegram');return;}
  tg.CloudStorage.getItem(PRO_KEY,(err,val)=>{
    if(val==='1'){
      setPro();
      rCurrent();
      alert('PRO восстановлен!');
    } else {
      alert('Покупка не найдена');
    }
  });
}

// ============================================================
// STATE
// ============================================================
const KEY='focus-v2';
const KVER='focus-ver';
const CUR_VER='4';
const CK='focus_s';
const CS=3800;

const DEF={
  balance:0,
  income:[],           // {id,date,amount,desc}
  expenses:[],         // {id,desc,amount,who:'my'|'mom'|modId,recurring:true}
  focus:{},            // "YYYY-MM-DD": [{id,text,done,emoji,createdAt}]
  tasks:{},            // "YYYY-MM-DD": [{id,text,done}]
  wins:[],             // {id,date,text,amount}
  routines:[],         // {id,text,emoji,days:[0-6],time}
  modules:[],          // {id,name,emoji,type:'bg'|'active',expenses:[],routines:[],note}
  completedDays:{},
};

let S={...DEF};
let vd=td(); // viewing date

// Helpers
function td(){const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function addD(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtD(s){const d=new Date(s);const dn=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];const mn=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];return `${dn[d.getDay()]}, ${d.getDate()} ${mn[d.getMonth()]}`;}
function fmtShort(s){const d=new Date(s);return `${d.getDate()}.${p2(d.getMonth()+1)}`;}
function thisYM(){return td().slice(0,7);}
function pluralDays(n){if(n===1)return 'день';if(n>=2&&n<=4)return 'дня';return 'дней';}
function c$(n){return '$'+n;}

// Storage
function loadL(){try{const r=localStorage.getItem(KEY);if(r)return{...DEF,...JSON.parse(r)};}catch(e){}return null;}
function saveL(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function saveC(){
  if(!isTG||!tg.CloudStorage)return;
  const j=JSON.stringify(S),ch=[];
  for(let i=0;i<j.length;i+=CS)ch.push(j.slice(i,i+CS));
  tg.CloudStorage.setItem(CK+'_n',String(ch.length),()=>{});
  ch.forEach((c,i)=>tg.CloudStorage.setItem(CK+'_'+i,c,()=>{}));
}
function loadC(cb){
  if(!isTG||!tg.CloudStorage){cb(null);return;}
  tg.CloudStorage.getItem(CK+'_n',(e,v)=>{
    if(e||!v){cb(null);return;}const n=parseInt(v);if(!n){cb(null);return;}
    const ks=[];for(let i=0;i<n;i++)ks.push(CK+'_'+i);
    tg.CloudStorage.getItems(ks,(e2,r)=>{
      if(e2||!r){cb(null);return;}let j='';for(let i=0;i<n;i++)j+=r[CK+'_'+i]||'';
      try{cb({...DEF,...JSON.parse(j)});}catch(e3){cb(null);}
    });
  });
}
function save(){saveL();saveC();}

// ============================================================
// COMPUTED
// ============================================================
function allExpenses(){
  let list=[...S.expenses];
  S.modules.forEach(m=>{if(m.expenses)m.expenses.forEach(e=>list.push({...e,modName:m.name,modEmoji:m.emoji}));});
  return list;
}
function monthlyTotal(){return allExpenses().reduce((s,e)=>s+e.amount,0);}
function myTotal(){return S.expenses.filter(e=>e.who==='my').reduce((s,e)=>s+e.amount,0);}
function momTotal(){return S.expenses.filter(e=>e.who==='mom').reduce((s,e)=>s+e.amount,0);}
function modTotal(){let t=0;S.modules.forEach(m=>{if(m.expenses)m.expenses.forEach(e=>t+=e.amount);});return t;}
function runway(){const e=monthlyTotal();return e>0?Math.round(S.balance/e*10)/10:99;}
function rwColor(r){return r>=3?'var(--green)':r>=1.5?'var(--gold)':'var(--red)';}
function incomeMonth(ym){return S.income.filter(i=>i.date.startsWith(ym||thisYM())).reduce((s,i)=>s+i.amount,0);}
function winsMonth(ym){return S.wins.filter(w=>w.date.startsWith(ym||thisYM()));}

function getDayItems(d){
  const f=S.focus[d]||[];
  const t=S.tasks[d]||[];
  const dow=new Date(d).getDay();
  const rout=[...S.routines.filter(r=>r.days.includes(dow))];
  S.modules.forEach(m=>{if(m.routines)m.routines.filter(r=>r.days.includes(dow)).forEach(r=>rout.push({...r,mEmoji:m.emoji}));});
  return{focuses:f,tasks:t,routines:rout};
}

function dayPct(d){
  const{focuses,tasks}=getDayItems(d);
  const tot=focuses.length+tasks.length;
  if(!tot)return -1; // no items
  return Math.round((focuses.filter(f=>f.done).length+tasks.filter(t=>t.done).length)/tot*100);
}

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  R(id);
}

// WEEK
// ============================================================
function rWeek(){
  const el=document.getElementById('week');
  const today=td();
  const d=new Date(vd);
  const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  const mon=new Date(new Date(vd).setDate(diff));
  const monS=`${mon.getFullYear()}-${p2(mon.getMonth()+1)}-${p2(mon.getDate())}`;
  const dayN=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

  let h=`<div class="day-nav" style="margin-bottom:16px;">
    <button class="day-nav-btn" onclick="vd=addD(vd,-7);rWeek()">‹</button>
    <div style="font-size:14px;font-weight:700;">Неделя</div>
    <button class="day-nav-btn" onclick="vd=addD(vd,7);rWeek()">›</button>
  </div><div class="wk-grid">`;

  let wF=0,wFD=0,wT=0,wTD=0;
  for(let i=0;i<7;i++){
    const ds=addD(monS,i);
    const isT=ds===today;
    const dt=new Date(ds);
    const it=getDayItems(ds);
    const pct=dayPct(ds);
    wF+=it.focuses.length;wFD+=it.focuses.filter(f=>f.done).length;
    wT+=it.tasks.length;wTD+=it.tasks.filter(t=>t.done).length;

    h+=`<div class="wk-d ${isT?'today':''}" onclick="vd='${ds}';go('day')">
      <div class="wk-dn">${dayN[i]}</div>
      <div class="wk-dd">${dt.getDate()}</div>
      <div class="wk-dots">${'🎯'.repeat(Math.min(it.focuses.length,3))}</div>
      <div class="wk-pct">${pct>=0?pct+'%':''}</div>
    </div>`;
  }
  h+=`</div>`;

  // Summary
  const wTotal=wF+wT;
  const wDone=wFD+wTD;
  const wPct=wTotal?Math.round(wDone/wTotal*100):0;
  h+=`<div class="wk-summary">
    <div><div class="wk-s-val">${wFD}/${wF}</div><div class="wk-s-label">Фокусов</div></div>
    <div><div class="wk-s-val">${wTD}/${wT}</div><div class="wk-s-label">Дел</div></div>
    <div><div class="wk-s-val" style="color:${wPct>=60?'var(--green)':'var(--t2)'}">${wPct}%</div><div class="wk-s-label">Общее</div></div>
  </div>`;

  el.innerHTML=h;
}

// ============================================================
// MONTH
// ============================================================
function rMonth(){
  const el=document.getElementById('month');
  const now=new Date(vd);
  const year=now.getFullYear(),month=now.getMonth();
  const firstDay=new Date(year,month,1).getDay(); // 0=Sun
  const daysInMonth=new Date(year,month+1,0).getDate();
  const mn=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const today=td();

  // Navigate months
  const prevM=new Date(year,month-1,1);
  const nextM=new Date(year,month+1,1);
  const prevS=`${prevM.getFullYear()}-${p2(prevM.getMonth()+1)}-15`;
  const nextS=`${nextM.getFullYear()}-${p2(nextM.getMonth()+1)}-15`;

  let h=`<div class="day-nav" style="margin-bottom:16px;">
    <button class="day-nav-btn" onclick="vd='${prevS}';rMonth()">‹</button>
    <div style="font-size:16px;font-weight:700;">${mn[month]} ${year}</div>
    <button class="day-nav-btn" onclick="vd='${nextS}';rMonth()">›</button>
  </div>`;

  // Day headers
  const dayH=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;">`;
  dayH.forEach(d=>{h+=`<div style="text-align:center;font-size:9px;color:var(--t3);font-weight:700;padding:4px 0;text-transform:uppercase;">${d}</div>`;});
  h+=`</div>`;

  // Calendar grid
  h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">`;

  // Empty cells before first day (Mon=1 start)
  let startOffset=(firstDay===0?6:firstDay-1);
  for(let i=0;i<startOffset;i++)h+=`<div style="padding:8px;"></div>`;

  // Day cells
  let mF=0,mFD=0,mT=0,mTD=0;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${p2(month+1)}-${p2(d)}`;
    const isT=ds===today;
    const pct=dayPct(ds);
    const it=getDayItems(ds);
    mF+=it.focuses.length;mFD+=it.focuses.filter(f=>f.done).length;
    mT+=it.tasks.length;mTD+=it.tasks.filter(t=>t.done).length;

    let bgCol='var(--s1)';
    let borderCol='var(--border)';
    if(isT)borderCol='var(--accent)';
    if(pct>=80)bgCol='var(--green-dim)';
    else if(pct>=40)bgCol='var(--gold-dim)';
    else if(pct>0)bgCol='var(--red-dim)';

    h+=`<div style="background:${bgCol};border:1px solid ${borderCol};border-radius:var(--rs);padding:8px 4px;text-align:center;cursor:pointer;${isT?'box-shadow:0 0 0 1px var(--accent);':''}" onclick="vd='${ds}';go('day')">
      <div style="font-size:14px;font-weight:700;${isT?'color:var(--accent);':''}">${d}</div>
      <div style="font-size:8px;color:var(--t3);margin-top:2px;font-family:'Space Mono',monospace;">${pct>=0?pct+'%':''}</div>
    </div>`;
  }
  h+=`</div>`;

  // Month summary
  const mTotal=mF+mT;
  const mDone=mFD+mTD;
  const mPct=mTotal?Math.round(mDone/mTotal*100):0;

  h+=`<div class="wk-summary" style="margin-top:16px;">
    <div><div class="wk-s-val">${mFD}/${mF}</div><div class="wk-s-label">Фокусов</div></div>
    <div><div class="wk-s-val">${mTD}/${mT}</div><div class="wk-s-label">Дел</div></div>
    <div><div class="wk-s-val" style="color:${mPct>=60?'var(--green)':'var(--t2)'}">${mPct}%</div><div class="wk-s-label">Выполнено</div></div>
  </div>`;

  // Income this month
  const ym=`${year}-${p2(month+1)}`;
  const mInc=S.income.filter(i=>i.date.startsWith(ym)).reduce((s,i)=>s+i.amount,0);
  const mWins=S.wins.filter(w=>w.date.startsWith(ym));
  const totE=monthlyTotal();
  const myE=myTotal(),momE=momTotal(),modE=modTotal();

  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
    <div class="pr-card" style="padding:12px;text-align:center;"><div class="pr-val" style="font-size:18px;color:var(--green);">+${c$(mInc)}</div><div class="pr-label">Доход</div></div>
    <div class="pr-card" style="padding:12px;text-align:center;"><div class="pr-val" style="font-size:18px;">${mWins.length} 🏆</div><div class="pr-label">Побед</div></div>
  </div>`;

  // Expenses summary on calendar
  h+=`<div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:10px;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
      <div style="font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;">📤 Расходы / мес</div>
      <div style="font-family:'Space Mono',monospace;font-size:16px;font-weight:700;">${c$(totE)}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;font-size:12px;">
      <div style="display:flex;justify-content:space-between;color:var(--t2);"><span>Мои (аренда, комм, еда)</span><span style="font-family:'Space Mono',monospace;">${c$(myE)}</span></div>
      <div style="display:flex;justify-content:space-between;color:var(--t2);"><span>👩 Мама (аренда, комм, еда)</span><span style="font-family:'Space Mono',monospace;">${c$(momE)}</span></div>`;
  
  // Module expenses
  S.modules.forEach(m=>{
    if(m.expenses&&m.expenses.length){
      const mExp=m.expenses.reduce((s,e)=>s+e.amount,0);
      h+=`<div style="display:flex;justify-content:space-between;color:var(--t2);"><span>${m.emoji} ${m.name}</span><span style="font-family:'Space Mono',monospace;">${c$(mExp)}</span></div>`;
    }
  });

  h+=`</div>
    <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:baseline;">
      <div style="font-size:10px;color:var(--t3);">≈ ${c$(Math.round(totE/30))}/день</div>
      <div style="font-size:10px;color:var(--t3);cursor:pointer;" onclick="go('money')">подробнее →</div>
    </div>
  </div>`;

  el.innerHTML=h;
}

// ============================================================
// ACTIONS
// ============================================================
function toggleFocus(d,id){if(!S.focus[d])return;const f=S.focus[d].find(x=>x.id===id);if(f){f.done=!f.done;save();}rCurrent();}
function delFocus(d,id){if(!S.focus[d])return;S.focus[d]=S.focus[d].filter(x=>x.id!==id);save();rCurrent();}
function toggleTask(d,id){if(!S.tasks[d])return;const t=S.tasks[d].find(x=>x.id===id);if(t){t.done=!t.done;save();}rCurrent();}
function delTask(d,id){if(!S.tasks[d])return;S.tasks[d]=S.tasks[d].filter(x=>x.id!==id);save();rCurrent();}
function delModule(id){if(!confirm('Удалить?'))return;S.modules=S.modules.filter(m=>m.id!==id);save();rProfile();}

function openMo(html){document.getElementById('mo-box').innerHTML=html;document.getElementById('mo').classList.add('show');setTimeout(()=>{const i=document.querySelector('.mo-input');if(i)i.focus();},100);}

function openAddRoutine(){

function subRoutine(){
  const t=document.getElementById('mi-rt').value.trim();if(!t)return;
  const emoji=document.getElementById('mi-rem').value.trim()||'🔄';
  const time=document.getElementById('mi-rtm').value.trim();
  const days=[];document.querySelectorAll('.mo-tag[data-rd].sel').forEach(el=>days.push(Number(el.dataset.rd)));
  if(!days.length){alert('Выбери хотя бы один день');return;}
  S.routines.push({id:uid(),text:t,emoji,days,time});
  save();closeMo();rProfile();

// ============================================================
// BACKUP
// ============================================================
function exportD(){
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`focus-${td()}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function importD(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    try{const d=JSON.parse(ev.target.result);if(!confirm('Заменить данные?'))return;S={...DEF,...d};save();location.reload();}catch(err){alert('Ошибка');}
  };r.readAsText(f);e.target.value='';
}

// ============================================================
// SWIPE (day view)
// ============================================================
let touchX=0;
document.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)<60)return;
  const active=document.querySelector('.screen.active').id;
  if(active==='day'){vd=addD(vd,dx>0?-1:1);rDay();}
  if(active==='week'){vd=addD(vd,dx>0?-7:7);rWeek();}
  if(active==='month'){const d=new Date(vd);d.setMonth(d.getMonth()+(dx>0?-1:1));vd=`${d.getFullYear()}-${p2(d.getMonth()+1)}-15`;rMonth();}
},{passive:true});

// ============================================================
// INIT
// ============================================================
function init(){
  // Force reset on version change
  const storedVer=localStorage.getItem(KVER);
  if(storedVer!==CUR_VER){
    localStorage.removeItem(KEY);
    localStorage.setItem(KVER,CUR_VER);
    S={...DEF};
    initDefaults();
    updateLocks();
    rProfile();
    return;
  }
  // Restore PRO from cloud
  if(isTG&&tg.CloudStorage){
    tg.CloudStorage.getItem(PRO_KEY,(err,val)=>{if(val==='1')setPro();});
  }
  const local=loadL();
  if(isTG){
    loadC(cloud=>{
      if(cloud&&cloud.balance!==undefined){S=cloud;saveL();}
      else if(local){S=local;saveC();}
      if(!S.expenses.length||!S.modules.length)initDefaults();
      updateLocks();
      rProfile();
    });
  } else {
    if(local)S=local;
    if(!S.expenses.length||!S.modules.length)initDefaults();
    updateLocks();
    rProfile();
  }
}

function initDefaults(){
  if(!S.expenses.length){
    S.expenses=[
      {id:uid(),desc:'Аренда квартира',amount:550,who:'my',recurring:true},
      {id:uid(),desc:'Коммунальные',amount:150,who:'my',recurring:true},
      {id:uid(),desc:'Еда (~15₾/день)',amount:167,who:'my',recurring:true},
      {id:uid(),desc:'Аренда мама',amount:350,who:'mom',recurring:true},
      {id:uid(),desc:'Коммунальные мама',amount:75,who:'mom',recurring:true},
      {id:uid(),desc:'Еда мама (~15₾/день)',amount:167,who:'mom',recurring:true},
    ];
  }
  if(!S.modules.length){
    S.modules=[
      {id:uid(),name:'Собака',emoji:'🐕',type:'bg',note:'Еда $10 + прогулка $10 в день',
        expenses:[{id:uid(),desc:'Еда + прогулка (600₾ ≈ $250)',amount:250}],
        routines:[{id:uid(),text:'Прогулка с собакой',days:[0,1,2,3,4,5,6],time:'19:00'}]},
      {id:uid(),name:'Мама здоровье',emoji:'👩',type:'bg',note:'Лекарства, анализы',
        expenses:[{id:uid(),desc:'Лекарства + анализы',amount:300}],
        routines:[{id:uid(),text:'Проверить лекарства мамы',days:[0,1,2,3,4,5,6],time:'10:00'}]},
      {id:uid(),name:'Лечение',emoji:'🧬',type:'active',note:'Фаготерапия — курс 90 дней',
        expenses:[],
        routines:[]},
    ];
  }
  save();
}

init();
